<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simple Slide Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #111; }
#deck { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 60px;
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}
.slide.active { opacity: 1; pointer-events: auto; }
.slide-1 { background: #1a1a2e; color: #fff; }
.slide-2 { background: #16213e; color: #e2e2e2; }
.slide-3 { background: #0f3460; color: #fff; }
h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
p  { font-size: 1.2rem; line-height: 1.7; max-width: 600px; text-align: center; }
ul { font-size: 1.1rem; line-height: 2; list-style: disc inside; }
.nav { position: fixed; bottom: 24px; right: 24px; display: flex; gap: 12px; z-index: 10; }
.nav button {
  background: rgba(255,255,255,0.15); color: #fff;
  border: 1px solid rgba(255,255,255,0.3); padding: 8px 20px;
  border-radius: 20px; cursor: pointer; font-size: 14px;
}
.nav button:hover { background: rgba(255,255,255,0.3); }
.counter { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 13px; }
</style>
</head>
<body>
<div id="deck">
  <section class="slide slide-1 active">
    <h1>AI 生成的演示文稿</h1>
    <p>这是第一张幻灯片的内容，测试标题和段落的可编辑性。点击下一张继续。</p>
  </section>
  <section class="slide slide-2">
    <h1>关键要点</h1>
    <ul>
      <li>第一个要点：保真度优先</li>
      <li>第二个要点：修订优先于创作</li>
      <li>第三个要点：渐进式编辑</li>
    </ul>
  </section>
  <section class="slide slide-3">
    <h1>总结与展望</h1>
    <p>这份演示文稿展示了 AI HTML slides editor 的核心能力。感谢观看！</p>
  </section>
</div>
<div class="nav">
  <button id="prev">← 上一张</button>
  <button id="next">下一张 →</button>
</div>
<div class="counter" id="counter">1 / 3</div>
<script>
var slides = document.querySelectorAll('.slide');
var cur = 0;
function __goTo(i) {
  if (i < 0 || i >= slides.length) return;
  slides[cur].classList.remove('active');
  cur = i;
  slides[cur].classList.add('active');
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides.length;
}
document.getElementById('next').onclick = function(){ __goTo(cur+1); };
document.getElementById('prev').onclick = function(){ __goTo(cur-1); };
document.addEventListener('keydown', function(e){
  if (e.key === 'ArrowRight' || e.key === ' ') __goTo(cur+1);
  if (e.key === 'ArrowLeft') __goTo(cur-1);
});
</script>
</body>
</html>
